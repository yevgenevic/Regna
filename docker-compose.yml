services:
  db:
    image: postgres:15-alpine
    container_name: ragna_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ragna_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragna_secret_2026}
      POSTGRES_DB: ragna_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragna_admin -d ragna_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: ragna_admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragna_app
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: "postgresql://ragna_admin:${DB_PASSWORD:-ragna_secret_2026}@db:5432/ragna_core?schema=public"
      PORT: "8080"
      NODE_ENV: "production"
      CORS_ORIGIN: "http://localhost:3000"

volumes:
  pgdata:
    driver: local
